project:
  name: brickwork_crack_detection
  seed: 42
  device: cuda
data:
  processed_dir: data_work/processed
  train_dir: data_work/processed/train
  val_dir: data_work/processed/val
  test_dir: data_work/processed/test
  image_size: 227
  num_workers: 4
  class_names: [non_crack, crack]
model:
  name: mobilenetv2
  num_classes: 2
  pretrained: true
  freeze_mode: full_finetune
training:
  epochs: 100
  batch_size: 32
  optimizer: adam
  learning_rate: 1.0e-5
  weight_decay: 0.0
  loss: cross_entropy
  amp: true
  early_stopping:
    monitor: val_accuracy
    patience: 20
    mode: max
augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  rotation_degrees: 45
  brightness_min: 0.3
  brightness_max: 1.0
weights:
  pretrained: true
  offline_mode: false
  local_weights_path: null
  allow_random_init_when_download_fails: false
  cache_dir: pretrained_weights
outputs:
  result_dir: results
  save_best: true
  save_last: true
  save_curves: true
  save_confusion_matrix: true
  save_predictions: true
runtime:
  strategy: full_finetune_aug
  run_dir: Reproduction/results/mobilenetv2/full_finetune_aug
